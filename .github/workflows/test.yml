name: Run Unit Tests

on:
  push:
    branches:
      - dev  # Запускать workflow только при пуше в ветку dev
  pull_request:
    branches:
      - dev  # Запускать workflow при создании PR в ветку dev

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # Шаг 1: Клонирование репозитория
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      # Шаг 2: Установка Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.12  # Укажите версию Python, используемую в проекте

      # Шаг 3: Установка зависимостей
      - name: Install dependencies
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt

      # Шаг 4: Запуск тестов
      - name: Run tests
        run: |
          source .venv/bin/activate
          pytest

      - name: Upload coverage to Codecov
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}